# render.yaml — Pocket Nori backend deployment on Render.com
#
# Services:
#   pocket-nori-api         Web service (FastAPI + uvicorn)
#   pocket-nori-worker      Combined Celery worker — ingest + extract + embed
#
# Environment variables marked sync: false must be set manually in the
# Render dashboard (Settings → Environment) for each service.
# Use the "Secret Group" feature to share them across both services.
#
# Estimated cost: 2 × Starter ($7/mo) = $14/mo

services:

  # ---------------------------------------------------------------------------
  # Web API
  # ---------------------------------------------------------------------------
  - type: web
    name: pocket-nori-api
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: API_BASE_URL
        sync: false   # set to your Render URL e.g. https://pocket-nori-personal-intelligence.onrender.com
      - key: FRONTEND_URL
        sync: false   # set to your Vercel URL e.g. https://pocket-nori-personal-intelligence.vercel.app

  # ---------------------------------------------------------------------------
  # Celery worker — combined (ingest + extract + embed in one process)
  # ---------------------------------------------------------------------------
  - type: worker
    name: pocket-nori-worker
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A src.workers.combined worker --loglevel=info --concurrency=2
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: API_BASE_URL
        value: placeholder
      - key: FRONTEND_URL
        value: placeholder
